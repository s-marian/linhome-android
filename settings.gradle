pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        maven { url "https://www.jitpack.io" }

        // Official Linphone Repo for 2026
        maven {
            url "https://download.linphone.org/maven_repository"
            content { includeGroup "org.linphone" }
        }
    }
}

rootProject.name='Linhome'
include ':app'